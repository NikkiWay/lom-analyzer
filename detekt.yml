# Конфигурация detekt. Запускается в CI (.github/workflows/build.yml).
#
# maxIssues: 0 в сочетании с detekt-baseline.xml означает «ни одного НОВОГО
# замечания»: уже накопленные замечания зафиксированы в baseline-файле и не
# ломают сборку, а любое новое — ломает. Baseline перегенерируется командой
# ./gradlew detektBaseline (делать это осознанно: он гасит замечания).
build:
  maxIssues: 0

complexity:
  active: true
  LongMethod:
    # Исполнители стадий пайплайна (ScoringExecutor, InferenceExecutor и др.) —
    # это последовательные оркестраторы: они читают данные, раскладывают их по
    # осям и делегируют расчёт чистым функциям. Дробить их ради порога значит
    # плодить приватные методы с десятком параметров, поэтому порог поднят
    # относительно умолчания detekt (60), но остаётся ограничивающим.
    threshold: 80
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 20

style:
  active: true
  MagicNumber:
    # Пороги и коэффициенты методики (0.50, 0.55, 1.345, 1.4826 и т. п.) заданы
    # константами с KDoc рядом с формулой; выносить их ещё дальше — ухудшать
    # читаемость.
    active: false
  WildcardImport:
    active: false
  MaxLineLength:
    # Умолчание detekt — 120. Код проекта писался под более широкую строку:
    # сигнатуры Compose и вызовы DAO с именованными аргументами регулярно
    # выходят за 120. 140 — осознанный компромисс, а не подгонка под факт:
    # строки длиннее уже зафиксированы в baseline как долг.
    maxLineLength: 140
